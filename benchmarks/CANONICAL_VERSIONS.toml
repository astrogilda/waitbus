# Canonical bench dependency versions.
#
# This file pins the exact versions of bench-internal libraries that the
# heterogeneous-swarm bench was developed and verified against. The bench
# preflight reads this file and refuses to run if the installed version of
# any pinned library drifts off the recorded major.minor band.
#
# These pins are bench-internal (consumer pyproject.toml does NOT consume
# this file). The bench tracks one known-good version of each library so
# that bumps to the consumer-facing pyproject pins do not silently
# invalidate bench provenance. To update a pin: bump the band here, re-run
# the full bench suite, confirm the verdict numbers are unchanged or note
# the version delta, then land the bump in one commit.
#
# Each entry's `band` is a major.minor range — the bench accepts any patch
# inside the band but refuses any major or minor bump without a deliberate
# bench-suite re-verification. The `observed` field records the exact
# version present when this file was last updated, so a future maintainer
# can correlate any verdict-number drift with a specific library bump.
#
# Format per package:
#   [packages.<name>]
#   band     = "<lower>,<upper-exclusive>"   # SemVer range, no spaces
#   observed = "<exact version at last update>"
#   notes    = "<one-line reason for the pin or band choice>"

[meta]
last_updated = "2026-06-03"

[packages.pydantic-ai-slim]
band     = ">=1.104,<2.0"
observed = "1.104.0"
notes    = "Token-usage capture path uses result.usage.input_tokens / .output_tokens; was deprecated request_tokens path pre-1.104."

