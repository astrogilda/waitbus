# Shared [Service] hardening block for waitbus systemd-user units.
#
# This file is NOT loaded by systemd directly. Modern systemd has no
# `.include` / `Include=` directive; the canonical override mechanism
# is a unit-specific `.d/` drop-in directory, which would have to be
# created for every long-lived unit and shipped through the package's
# shared-data declaration. Doing so would multiply install-time work
# without strengthening the actual sandbox: the hardening directives
# below only take effect if they are present in the unit file that
# systemd loads, so each shipped `.service` file already carries them
# inline.
#
# The file's role is therefore a single source of truth for code
# review: every long-lived `.service` unit in this directory carries
# the directives listed below verbatim, and `tests/test_systemd_units.py`
# asserts the inline copies stay in lockstep with this reference. New
# directives land here first, then propagate to each service unit in
# the same commit, with the test catching drift.
#
# Oneshot units (`waitbus-etag-poll.service`, `waitbus-watchdog.service`)
# inherit most of these directives but layer additional restrictions
# such as `ProtectHome=tmpfs` for the watchdog; their hardening blocks
# are reviewed against this reference but are not required to match
# byte-for-byte.

[Service]
PrivateTmp=true
ProtectSystem=strict
ProtectHome=read-only
NoNewPrivileges=true
MemoryDenyWriteExecute=true
LimitNOFILE=1024
UMask=0077
Environment=LC_ALL=C.UTF-8 LANG=C.UTF-8
# ProtectKernelTunables=true  # disabled: requires CAP_SETPCAP unavailable in user-systemd
# ProtectKernelModules=true  # disabled: requires CAP_SETPCAP unavailable in user-systemd
# ProtectControlGroups=true  # disabled: requires CAP_SETPCAP unavailable in user-systemd
RestrictNamespaces=true
RestrictRealtime=true
SystemCallArchitectures=native
SystemCallFilter=@system-service
SystemCallFilter=~@privileged @resources
