name: Release Please

# Maintains a rolling release pull request that bumps the version across every
# version file (pyproject.toml, .claude-plugin/plugin.json, server.json) and
# updates CHANGELOG.md from Conventional Commits. Merging that PR creates the
# vX.Y.Z tag, which triggers release.yml (PyPI + MCP registry + GitHub Release).
#
# The tag push must be attributed to a token that can trigger other workflows.
# The default GITHUB_TOKEN intentionally does not, so a PAT with repo scope is
# passed via the RELEASE_PLEASE_TOKEN secret. Without it the tag is created but
# release.yml (which triggers on push of v* tags) never fires.

on:
  push:
    branches:
      - main

# Serialize runs so two main pushes never race on the same release PR;
# no cancel-in-progress because interrupting a release PR update midway
# can leave the PR and manifest out of sync.
concurrency:
  group: release-please-${{ github.ref }}

permissions: {}

jobs:
  release-please:
    name: Maintain the release pull request
    runs-on: ubuntu-latest
    permissions:
      # release-please needs both writes by design: it pushes the release
      # branch/tag and maintains the rolling release pull request.
      contents: write # zizmor: ignore[excessive-permissions] required to create the release branch and tag
      pull-requests: write # zizmor: ignore[excessive-permissions] required to open and update the release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
