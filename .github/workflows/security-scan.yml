name: security scan

# Continuous supply-chain scan. The release gate scans the lockfile at tag
# time, and ci.yml scans on every push/PR, but a frozen lockfile can become
# vulnerable when a CVE is disclosed AFTER the last commit. This scheduled run
# re-checks the committed uv.lock against the OSV database weekly so a newly
# disclosed advisory surfaces without waiting for the next push or release.

on:
  schedule:
    # Mondays 07:00 UTC.
    - cron: '0 7 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  osv-scan:
    name: OSV scan (uv.lock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Vulnerability scan (uv.lock against OSV)
        # osv-scanner is a Go binary (not on PyPI); fetch the pinned release
        # asset for the linux-amd64 runner. Same invocation as ci.yml and
        # release.yml so all three gates agree.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v2.3.8 --repo google/osv-scanner \
            --pattern osv-scanner_linux_amd64 --output ./osv-scanner --clobber
          chmod +x ./osv-scanner
          ./osv-scanner scan source --lockfile=uv.lock
